<!DOCTYPE html>
<html>
{{ partial "header.html" . }}

<body>
  <div class="container wrapper tags">
    {{ partial "head.html" . }}

    <h1 class="page-title">{{ .Title }}</h1>

    {{ with .Content }}{{ . }}{{ end }}

    {{ $data := .Data }}
    <div class="tag-cloud">
    {{ range $key, $value := .Data.Terms.ByCount }}
      <a href="{{ $.Site.LanguagePrefix | absURL }}{{ $data.Plural }}/{{ $value.Name | urlize }}/">{{ $value.Name }}<span class="tag-count"> x{{ $value.Count }}</span></a>
    {{ end }}
    </div>
  </div>

  {{ partial "footer.html" . }}
</body>

</html>
